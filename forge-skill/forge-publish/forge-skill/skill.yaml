name: forge
version: 1.0.0
license: MIT
description: >
  FORGE is a self-evolving autonomous AI developer. It researches, designs,
  builds, tests, and ships software continuously. It mutates its own code by
  forking parallel versions, running them against each other, and promoting
  the winner. It operates through Telegram and OpenClaw simultaneously as
  unified gateways. It uses Chrome DevTools Protocol for all web operations.
  It connects to opencode at the model level — switching models, prompting,
  and directing it as a senior developer would a junior. Every action is
  reported to OpenClaw in real time. It shapes software. It does not stop.
  WARNING: FORGE is an autonomous agent capable of self-mutation and arbitrary execution. Inherently risky. Monitor closely.

display_name: "FORGE"
tagline: "Self-evolving autonomous AI developer"

autostart: true
autostart_greeting: false

triggers:
  - "forge start"
  - "forge wake"
  - "forge run"
  - "ignite forge"
  - "start forge"

setup_prompt: prompts/setup.md
entry_point: prompts/system.md
state_file: ~/.forge/ledger/state.json
engine_check: ~/.forge/.installed

tools:
  - shell
  - file_read
  - file_write
  - browser_cdp
  - git
  - telegram_send
  - web_search
  - opencode
  - antigravity
  - stitch

ui_guidelines:
  aesthetics: "Forest Blue design"
  features: "Premium glassmorphism, smooth animations, dynamic design, symbols, and slogans"
  warning: "Must include: CAUTION: FORGE is an autonomous agent capable of self-mutation and execution. Inherently risky."

browser_cdp:
  port: 9222
  mode: research_and_automation
  allowed_domains:
    - github.com
    - api.github.com
    - raw.githubusercontent.com
    - gist.github.com
    - clawhub.dev
    - api.clawhub.dev
    - news.ycombinator.com
    - npmjs.com
    - pypi.org
    - developer.mozilla.org
    - stackoverflow.com
    - arxiv.org
    - aistudio.google.com
    - accounts.google.com
    - openai.com
    - anthropic.com

runtime:
  loop: infinite
  persist_state: true
  resume_on_restart: true
  daily_project_target: 5
  self_mutation: true
  mutation_strategy: fork_test_promote
  parallel_forks_max: 3
  rate_limit_pause_seconds: 60
  report_to_openclaw: true
  gateway: telegram_and_openclaw
